<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1600" y2="0" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="105" x2="1600" y2="105" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="210" x2="1600" y2="210" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1600" y2="315" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="420" x2="1600" y2="420" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="525" x2="1600" y2="525" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="630" x2="1600" y2="630" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="735" x2="1600" y2="735" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="840" x2="1600" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="1400" y1="0" x2="1400" y2="840" stroke="#ffffff" stroke-width="1"/>
    <line x1="1600" y1="0" x2="1600" y2="840" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Code block — right side -->
  <g transform="translate(820, 120)">
    <rect width="700" height="600" rx="12" fill="#1e2736" opacity="0.9"/>
    <rect width="700" height="40" rx="12" fill="#252d3d"/>
    <rect width="700" height="28" y="12" fill="#252d3d"/>
    <!-- Window dots -->
    <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="20" r="6" fill="#febc2e"/>
    <circle cx="66" cy="20" r="6" fill="#28c840"/>
    <!-- Filename tab -->
