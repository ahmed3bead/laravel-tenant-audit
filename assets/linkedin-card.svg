<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="628" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#orange)"/>

  <!-- Left accent line -->
  <rect x="0" y="4" width="4" height="624" fill="url(#orange)" opacity="0.4"/>

  <!-- Large background text watermark -->
  <text x="600" y="400" font-family="system-ui, sans-serif" font-size="280" font-weight="900" fill="#f97316" opacity="0.03" text-anchor="middle" letter-spacing="-10">AUDIT</text>

  <!-- Package badge top-left -->
  <rect x="52" y="52" width="170" height="34" rx="17" fill="#f97316" opacity="0.12"/>
  <rect x="52" y="52" width="170" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <text x="137" y="74" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">OPEN SOURCE</text>

  <!-- Version badge -->
  <rect x="234" y="52" width="80" height="34" rx="17" fill="#30363d" opacity="0.8"/>
  <text x="274" y="74" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e" text-anchor="middle">v1.0.0</text>

  <!-- Main headline -->
  <text x="52" y="180" font-family="system-ui, sans-serif" font-size="68" font-weight="900" fill="#f0f6fc" letter-spacing="-2">laravel-tenant-audit</text>

  <!-- Subheading -->
  <text x="52" y="240" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#8b949e">Multi-tenant audit logging for Laravel 10–13</text>

  <!-- Orange divider -->
  <rect x="52" y="272" width="300" height="3" rx="2" fill="url(#divider)"/>

  <!-- Features — two columns -->
  <!-- Col 1 -->
  <g transform="translate(52, 310)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#f97316" opacity="0.8"/>
    <text x="26" y="12" font-family="system-ui, sans-serif" font-size="17" fill="#c9d1d9">Polymorphic actor — Admin, Vendor, Customer</text>

    <rect x="0" y="44" width="14" height="14" rx="3" fill="#a78bfa" opacity="0.8"/>
    <text x="26" y="56" font-family="system-ui, sans-serif" font-size="17" fill="#c9d1d9">Per-model allowlists &amp; event toggles</text>

    <rect x="0" y="88" width="14" height="14" rx="3" fill="#34d399" opacity="0.8"/>
    <text x="26" y="100" font-family="system-ui, sans-serif" font-size="17" fill="#c9d1d9">Custom business events</text>

    <rect x="0" y="132" width="14" height="14" rx="3" fill="#60a5fa" opacity="0.8"/>
    <text x="26" y="144" font-family="system-ui, sans-serif" font-size="17" fill="#c9d1d9">Async queue · Auto-pruning · Morph map</text>

    <rect x="0" y="176" width="14" height="14" rx="3" fill="#f472b6" opacity="0.8"/>
    <text x="26" y="188" font-family="system-ui, sans-serif" font-size="17" fill="#c9d1d9">disableAudit() · withoutAudit() · auditEvent()</text>
  </g>

  <!-- Composer install command box -->
  <rect x="52" y="548" width="560" height="50" rx="8" fill="#1e2736"/>
  <rect x="52" y="548" width="560" height="50" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="76" y="569" font-family="monospace" font-size="13" fill="#8b949e">$</text>
  <text x="94" y="569" font-family="monospace" font-size="13" fill="#34d399">composer require</text>
  <text x="232" y="569" font-family="monospace" font-size="13" fill="#f0f6fc"> ahmed3bead/laravel-tenant-audit</text>
  <text x="76" y="589" font-family="monospace" font-size="12" fill="#484f58">github.com/ahmed3bead/laravel-tenant-audit</text>

  <!-- Right side — stats panel -->
  <rect x="820" y="100" width="330" height="430" rx="16" fill="#161b22" opacity="0.9"/>
  <rect x="820" y="100" width="330" height="430" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Stats panel header -->
  <text x="985" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="2">PACKAGE STATS</text>
  <line x1="840" y1="168" x2="1130" y2="168" stroke="#30363d" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="985" y="220" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#f97316" text-anchor="middle" filter="url(#glow)">55</text>
  <text x="985" y="248" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">passing tests</text>
  <line x1="840" y1="270" x2="1130" y2="270" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Stat 2 -->
  <text x="985" y="322" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#a78bfa" text-anchor="middle" filter="url(#glow)">1</text>
  <text x="985" y="350" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">table · zero config</text>
  <line x1="840" y1="372" x2="1130" y2="372" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Stat 3 -->
  <text x="985" y="424" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#34d399" text-anchor="middle" filter="url(#glow)">4</text>
  <text x="985" y="452" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Laravel versions supported</text>
  <line x1="840" y1="474" x2="1130" y2="474" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Stat 4 -->
  <text x="985" y="507" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#60a5fa" text-anchor="middle">PHP 8.1+</text>
  <text x="985" y="525" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">minimum requirement</text>

  <!-- Author -->
  <text x="985" y="580" font-family="system-ui, sans-serif" font-size="13" fill="#484f58" text-anchor="middle">Ahmed Abead · MIT License</text>
</svg>
